<!DOCTYPE html>
<html>
<head>

<title>Smart Switch Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
background:#0b0f1a;
color:white;
font-family:Arial;
text-align:center;
}

.card{
width:250px;
padding:30px;
margin:20px;
background:#1b2338;
border-radius:15px;
display:inline-block;
}

button{
width:120px;
height:50px;
font-size:18px;
border:none;
border-radius:10px;
}

.on{
background:#00c853;
}

.off{
background:#d50000;
}

</style>

</head>

<body>

<h1>Smart Switch Dashboard</h1>

<div id="relays"></div>

<script>

var firebaseConfig = {

apiKey: "YOUR_API_KEY",
databaseURL: "https://YOUR_PROJECT.firebaseio.com/"

};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

function createRelay(id){

var html = `
<div class="card">
<h2>Relay ${id}</h2>
<button onclick="setRelay(${id},1)" class="on">ON</button>
<button onclick="setRelay(${id},0)" class="off">OFF</button>
</div>
`;

document.getElementById("relays").innerHTML += html;

}

for(let i=1;i<=4;i++) createRelay(i);

function setRelay(id,val){

db.ref("relay/"+id+"/manual").set(val);

}

</script>

</body>
</html>
