<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Switch PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
background:#0d0f14;
font-family:Arial;
color:white;
text-align:center;
}

.header{
font-size:30px;
margin-top:20px;
}

.status{
margin:10px;
color:#bbb;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.card{
background:#1c1f26;
padding:25px;
border-radius:15px;
}

button{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#444;
color:white;
cursor:pointer;
}

button.on{
background:#00e676;
color:black;
}

</style>

</head>

<body>

<div class="header">Smart Switch 4CH</div>

<div class="status">
WiFi RSSI : <span id="wifi">--</span> dBm
</div>

<div class="container">

<div class="card">
<h3>Relay 1</h3>
<button id="b1" onclick="toggle(1)">OFF</button>
</div>

<div class="card">
<h3>Relay 2</h3>
<button id="b2" onclick="toggle(2)">OFF</button>
</div>

<div class="card">
<h3>Relay 3</h3>
<button id="b3" onclick="toggle(3)">OFF</button>
</div>

<div class="card">
<h3>Relay 4</h3>
<button id="b4" onclick="toggle(4)">OFF</button>
</div>

</div>

<script>

var firebaseConfig = {
databaseURL:"https://smart-switch-4ch-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

function toggle(ch){

var btn = document.getElementById("b"+ch);

var state = btn.classList.contains("on") ? 0 : 1;

db.ref("relay/"+ch+"/manual").set(state);

}

for(let i=1;i<=4;i++){

db.ref("relay/"+i+"/status").on("value",(snap)=>{

var val = snap.val();

var btn = document.getElementById("b"+i);

if(val==1){

btn.innerHTML="ON";
btn.classList.add("on");

}else{

btn.innerHTML="OFF";
btn.classList.remove("on");

}

});

}

db.ref("wifi/rssi").on("value",(snap)=>{
document.getElementById("wifi").innerHTML = snap.val();
});

</script>

</body>
</html>
